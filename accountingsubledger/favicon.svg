<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="p1" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f391c1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </radialGradient>
    <radialGradient id="p2" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c1f391"/>
      <stop offset="100%" stop-color="#99ec48"/>
    </radialGradient>
    <radialGradient id="p3" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9191f3"/>
      <stop offset="100%" stop-color="#4848ec"/>
    </radialGradient>
  </defs>
  <!-- Connecting lines (behind planets) -->
  <line x1="10" y1="10" x2="24" y2="12" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="10" x2="17" y2="25" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="12" x2="17" y2="25" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
  <!-- Large planet (primary) -->
  <circle cx="10" cy="10" r="6.5" fill="url(#p1)"/>
  <circle cx="10" cy="10" r="6.5" fill="none" stroke="#f391c1" stroke-width="0.5" opacity="0.4"/>
  <!-- Medium planet -->
  <circle cx="24" cy="12" r="4.5" fill="url(#p2)"/>
  <circle cx="24" cy="12" r="4.5" fill="none" stroke="#c1f391" stroke-width="0.5" opacity="0.4"/>
  <!-- Small planet -->
  <circle cx="17" cy="25" r="3" fill="url(#p3)"/>
  <circle cx="17" cy="25" r="3" fill="none" stroke="#9191f3" stroke-width="0.5" opacity="0.4"/>
</svg>
