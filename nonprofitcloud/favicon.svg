<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="p1" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f9c46c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <radialGradient id="p2" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6cf9c4"/>
      <stop offset="100%" stop-color="#0af59e"/>
    </radialGradient>
    <radialGradient id="p3" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f96ce6"/>
      <stop offset="100%" stop-color="#f50ad6"/>
    </radialGradient>
  </defs>
  <!-- Connecting lines (behind planets) -->
  <line x1="10" y1="10" x2="24" y2="12" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
  <line x1="10" y1="10" x2="17" y2="25" stroke="#64748b" stroke-width="0.8" opacity="0.6"/>
  <line x1="24" y1="12" x2="17" y2="25" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
  <!-- Large planet (primary) -->
  <circle cx="10" cy="10" r="6.5" fill="url(#p1)"/>
  <circle cx="10" cy="10" r="6.5" fill="none" stroke="#f9c46c" stroke-width="0.5" opacity="0.4"/>
  <!-- Medium planet -->
  <circle cx="24" cy="12" r="4.5" fill="url(#p2)"/>
  <circle cx="24" cy="12" r="4.5" fill="none" stroke="#6cf9c4" stroke-width="0.5" opacity="0.4"/>
  <!-- Small planet -->
  <circle cx="17" cy="25" r="3" fill="url(#p3)"/>
  <circle cx="17" cy="25" r="3" fill="none" stroke="#f96ce6" stroke-width="0.5" opacity="0.4"/>
</svg>
